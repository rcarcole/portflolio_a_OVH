<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dear Zhara · v2</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Ubuntu+Condensed&display=swap"
    rel="stylesheet" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />

  <!-- Styles (una sola vez, con cache-bust) -->
  <link rel="stylesheet" href="styles.css?v=20250826" />
</head>

<body>
  <!-- Canvas SIEMPRE dentro del body -->
  <canvas id="fireworks"></canvas>

  <div class="envelope">
    <div class="letter" id="letter">
      <div class="container" id="frasesContainer">
        <!-- JS inyectará aquí las <p> de FRASES -->
        <button type="button" class="btn btn-secondary btn-centrado" data-bs-toggle="modal" data-bs-target="#miModal">
          VER MÁS
        </button>
      </div>
    </div>
  </div>

  <p class="dearZhara" id="dearZhara">Dear Zhara</p>

  <!-- Modal -->
  <div class="modal fade" id="miModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalLabel">¿Quieres seguir conmigo?</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">Elige una opción:</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" id="btnSi">Sí</button>
          <button type="button" class="btn btn-secondary" id="btnNo">No</button>
          <div id="liveAlertPlaceholder"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>

  <!-- App (una sola vez, al final, con cache-bust) -->
  <script src="script.js?v=20250826"></script>
</body>

</html>
